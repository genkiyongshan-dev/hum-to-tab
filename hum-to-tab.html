<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>HUM → TAB</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
:root{--bg:#08080a;--sf:#101014;--bd:#1c1c22;--acc:#ff6b6b;--tx:#ccc;--dm:#555;--dm2:#333;--gl:rgba(255,107,107,.12);--blue:#74c0fc;--gold:#ffd43b;--grn:#69db7c}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:'JetBrains Mono',monospace;overflow:hidden;height:100vh;touch-action:none;-webkit-user-select:none;user-select:none}
#app{display:flex;flex-direction:column;height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-bottom:1px solid var(--bd);background:var(--sf)}
.logo{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--acc)}.logo span{color:var(--dm);font-weight:400}
.tog{display:flex;background:var(--bg);border-radius:5px;padding:2px;gap:1px}
.tog button{background:none;border:none;color:var(--dm);font-family:inherit;font-size:8px;padding:4px 8px;border-radius:3px;cursor:pointer}
.tog button.on{background:var(--acc);color:#000;font-weight:700}
.srow{display:flex;align-items:center;gap:5px;padding:4px 12px;border-bottom:1px solid var(--bd);background:var(--sf);flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:3px;border:1px solid var(--bd);padding:2px 7px;border-radius:10px;font-size:8px;color:var(--dm);cursor:pointer}
.chip.on{border-color:var(--acc);color:var(--acc)}
.chip svg{width:9px;height:9px}
.srow .spacer{flex:1}
.sg{display:flex;align-items:center;gap:3px}
.sg label{font-size:7px;color:var(--dm)}
.sg input[type=range]{-webkit-appearance:none;width:44px;height:3px;border-radius:2px;background:#282830;outline:none}
.sg input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:var(--acc);cursor:pointer}
.sg .sv{font-size:7px;color:var(--acc);min-width:18px;text-align:right}
.pitch{display:flex;align-items:center;justify-content:center;gap:10px;padding:4px 12px;border-bottom:1px solid var(--bd);min-height:38px}
.pitch .note{font-size:24px;font-weight:700;min-width:36px;text-align:center;color:var(--dm);transition:color .15s}
.pitch .note.on{color:var(--acc)}.pitch .hz{font-size:11px}.pitch .hzl{font-size:7px;color:var(--dm)}
.lvl{width:40px;height:3px;background:var(--bd);border-radius:2px;overflow:hidden}
.lvl-bar{height:100%;background:var(--acc);border-radius:2px;width:0%}
.tbar{display:flex;align-items:center;gap:5px;padding:4px 12px;border-bottom:1px solid var(--bd);background:var(--sf);min-height:22px}
.key-b{font-size:9px;font-weight:700;color:var(--acc);background:rgba(255,107,107,.08);padding:1px 6px;border-radius:3px;border:1px solid rgba(255,107,107,.25)}
.pat-name{font-size:8px;color:var(--gold);margin-left:auto;font-weight:700}
.cbar{display:flex;align-items:center;gap:3px;padding:4px 12px;border-bottom:1px solid var(--bd);overflow-x:auto;scrollbar-width:none;min-height:34px}
.cbar::-webkit-scrollbar{display:none}
.cbar .lbl{font-size:7px;color:var(--dm);flex-shrink:0;margin-right:2px}
.ci{flex-shrink:0;text-align:center;cursor:pointer}
.ci .cn{padding:2px 6px;border-radius:3px;font-size:9px;font-weight:700;background:#15151a;color:var(--dm);border:1px solid var(--bd)}
.ci .cd{font-size:6px;color:var(--dm);margin-top:1px}
.ci.now .cn{background:rgba(255,107,107,.1);border-color:rgba(255,107,107,.35);color:var(--acc)}
.ci.sel .cn{background:rgba(255,107,107,.18);border-color:var(--acc);color:var(--acc)}
.ca{color:var(--dm2);font-size:7px;flex-shrink:0}
.pred{display:flex;align-items:center;gap:3px;padding:4px 12px;border-bottom:1px solid var(--bd);min-height:28px;overflow-x:auto;scrollbar-width:none}
.pred::-webkit-scrollbar{display:none}
.pred .plbl{font-size:7px;color:var(--dm);flex-shrink:0;margin-right:2px;white-space:nowrap}
.pb{flex-shrink:0;padding:3px 8px;border-radius:3px;font-size:9px;font-weight:700;background:rgba(116,192,252,.06);color:var(--blue);border:1px solid rgba(116,192,252,.25);cursor:pointer}
.pb .pd{font-size:6px;color:var(--dm);font-weight:400}
.pb.hot{border-color:rgba(255,215,59,.4);color:var(--gold);background:rgba(255,215,59,.06)}
.dgr{border-bottom:1px solid var(--bd);overflow:hidden;max-height:0;transition:max-height .25s;background:var(--sf)}
.dgr.open{max-height:140px}
.dgr .inner{display:flex;align-items:center;padding:6px 12px;gap:8px}
.dgr .dn{font-size:18px;font-weight:700;color:var(--acc);min-width:34px}
.dgr .di{font-size:7px;color:var(--dm);line-height:1.5}
.play-btn{background:none;border:1px solid var(--acc);color:var(--acc);font-family:inherit;font-size:8px;padding:3px 8px;border-radius:4px;cursor:pointer;margin-top:4px}
.play-btn:active{background:var(--acc);color:#000}
.main{flex:1;position:relative;overflow:hidden}
.main canvas{width:100%;height:100%;display:block}
.lp{position:absolute;inset:0;background:var(--bg);overflow-y:auto;display:none;padding:12px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.lp::-webkit-scrollbar{display:none}.lp.show{display:block}
.ls{margin-bottom:16px}.ls h3{font-size:11px;color:var(--acc);margin-bottom:6px;letter-spacing:.5px}
.ls p{font-size:9px;color:var(--dm);line-height:1.7;margin-bottom:4px}
.ls .hi{color:var(--acc);font-weight:700}.ls .hb{color:var(--blue)}.ls .hg{color:var(--gold)}
.lc{background:var(--sf);border:1px solid var(--bd);border-radius:6px;padding:10px;margin-bottom:8px;cursor:pointer}
.lc.open{border-color:rgba(255,107,107,.3)}
.lc h4{font-size:10px;color:var(--tx);display:flex;align-items:center;gap:6px}
.lc h4 .tg{font-size:7px;padding:1px 5px;border-radius:2px}
.lc h4 .t-t{color:var(--acc);background:rgba(255,107,107,.1)}
.lc h4 .t-s{color:var(--gold);background:rgba(255,215,59,.1)}
.lc h4 .t-d{color:var(--blue);background:rgba(116,192,252,.1)}
.lc .ld{display:none;margin-top:6px}.lc.open .ld{display:block}
.lc .ld p{font-size:8px;color:var(--dm);line-height:1.7}
.lc .dr{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.lc .dg{padding:2px 6px;border-radius:3px;font-size:9px;font-weight:700;background:rgba(255,107,107,.08);color:var(--acc);border:1px solid rgba(255,107,107,.2)}
.dn-box{background:rgba(255,215,59,.06);border:1px solid rgba(255,215,59,.2);border-radius:6px;padding:8px 10px;margin-bottom:8px}
.dn-box h4{font-size:10px;color:var(--gold);margin-bottom:4px}
.dn-box p{font-size:8px;color:var(--dm);line-height:1.7}
.func-tbl{width:100%;border-collapse:collapse;margin:6px 0;font-size:8px}
.func-tbl th{text-align:left;padding:3px 6px;border-bottom:1px solid var(--bd);color:var(--dm);font-weight:400}
.func-tbl td{padding:3px 6px;border-bottom:1px solid var(--bd)}.func-tbl .ft{font-weight:700}
.ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(8,8,10,.85);z-index:20;transition:opacity .4s;pointer-events:none}
.ov.hide{opacity:0}
.ov h2{font-size:13px;color:var(--acc);margin-bottom:5px;letter-spacing:1px;text-align:center}
.ov p{font-size:9px;color:var(--dm);line-height:1.6;max-width:220px;text-align:center}
.ctrl{display:flex;align-items:center;justify-content:center;padding:10px;gap:12px;border-top:1px solid var(--bd);background:var(--sf)}
.ctrl .mic{width:46px;height:46px;border-radius:50%;border:2px solid var(--acc);background:transparent;color:var(--acc);cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative}
.ctrl .mic.on{background:var(--acc);color:#000;box-shadow:0 0 12px var(--gl)}
.ctrl .mic.on::after{content:'';position:absolute;inset:-5px;border-radius:50%;border:2px solid var(--acc);animation:pu 1.4s ease-out infinite}
@keyframes pu{0%{transform:scale(1);opacity:.5}100%{transform:scale(1.25);opacity:0}}
.ctrl .mic svg{width:17px;height:17px}
.ctrl .btn{background:none;border:1px solid var(--bd);color:var(--dm);font-family:inherit;font-size:8px;padding:5px 9px;border-radius:5px;cursor:pointer}
</style>
</head>
<body>
<div id="app">
  <div class="hdr"><div class="logo">HUM<span>→</span>TAB</div><div class="tog" id="mT"><button class="on" onclick="setMode('tab')">TAB</button><button onclick="setMode('chord')">CHORD</button><button onclick="setMode('learn')">LEARN</button></div></div>
  <div class="srow">
    <div class="chip on" id="cMic" onclick="setIn('mic')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/></svg>鼻歌</div>
    <div class="chip" id="cAud" onclick="setIn('audio')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>音源</div>
    <div class="chip" id="cGtr" onclick="setIn('guitar')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="6" width="20" height="12" rx="2"/><line x1="8" y1="6" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="18"/></svg>ギター</div>
    <div class="spacer"></div>
    <div class="sg"><label>感度</label><input type="range" min="1" max="10" value="7" step="1" oninput="sens=+this.value;this.nextElementSibling.textContent=this.value"><span class="sv">7</span></div>
    <div class="sg"><label>窓</label><input type="range" min="500" max="3000" value="1500" step="100" oninput="cWin=+this.value;this.nextElementSibling.textContent=(cWin/1000).toFixed(1)+'s'"><span class="sv">1.5s</span></div>
  </div>
  <div class="pitch"><div><div class="note" id="pN">--</div><div><span class="hz" id="pH">---</span><span class="hzl"> Hz</span></div></div><div><div class="lvl"><div class="lvl-bar" id="lB"></div></div></div></div>
  <div class="tbar"><span class="key-b" id="kB">Key: --</span><span class="pat-name" id="paN"></span></div>
  <div class="cbar" id="cb"><span class="lbl">進行</span></div>
  <div class="pred" id="pr"><span class="plbl">次→</span></div>
  <div class="dgr" id="dg"><div class="inner"><div class="dn" id="dN">--</div><canvas id="dC" width="120" height="90"></canvas><div class="di" id="dI"></div></div></div>
  <div class="main"><canvas id="tc"></canvas><div class="lp" id="lP"></div><div class="ov" id="ov"><div><h2>HUM → TAB</h2><p>マイクボタンで入力開始<br><br>鼻歌 / 音源 / ギター実音<br>3つの入力モードで解析<br><br>コードをタップすると音が鳴ります</p></div></div></div>
  <div class="ctrl"><button class="btn" onclick="clearAll()">CLEAR</button><button class="mic" id="mic" onclick="toggle()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></button><button class="btn" onclick="doExport()">EXPORT</button></div>
</div>
<script>
const NM=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const TUN=[64,59,55,50,45,40],SC=['#ff6b6b','#ffa94d','#ffd43b','#69db7c','#74c0fc','#b197fc'],SL=['e','B','G','D','A','E'];
const DIA=[{d:'I',o:0,t:'',fn:'T'},{d:'ii',o:2,t:'m',fn:'SD'},{d:'iii',o:4,t:'m',fn:'T'},{d:'IV',o:5,t:'',fn:'SD'},{d:'V',o:7,t:'',fn:'D'},{d:'vi',o:9,t:'m',fn:'T'},{d:'vii°',o:11,t:'dim',fn:'D'}];
const TRANS={'I':[{to:'IV',w:5},{to:'V',w:5},{to:'vi',w:4},{to:'ii',w:3},{to:'iii',w:2}],'ii':[{to:'V',w:5},{to:'IV',w:3}],'iii':[{to:'vi',w:5},{to:'IV',w:4},{to:'ii',w:2}],'IV':[{to:'V',w:5},{to:'I',w:4},{to:'iii',w:3},{to:'ii',w:2},{to:'vi',w:2}],'V':[{to:'I',w:5},{to:'vi',w:4},{to:'IV',w:2}],'vi':[{to:'IV',w:5},{to:'ii',w:4},{to:'V',w:3},{to:'I',w:2}],'vii°':[{to:'I',w:5},{to:'iii',w:3}]};
const PATS=[{name:'カノン進行',degs:['I','V','vi','iii','IV','I','IV','V'],desc:'J-POP最多用。',ex:'クリスマスイブ, Lemon'},{name:'王道進行',degs:['IV','V','iii','vi'],desc:'サビで多用。',ex:'残酷な天使のテーゼ'},{name:'小室進行',degs:['vi','IV','V','I'],desc:'マイナーからメジャーへ。',ex:'Get Wild'},{name:'丸サ進行',degs:['IV','iii','vi','I'],desc:'おしゃれ浮遊感。',ex:'夜に駆ける'},{name:'レットイットビー',degs:['I','V','vi','IV'],desc:'世界で最も有名。',ex:'Let It Be'},{name:'循環コード',degs:['I','vi','IV','V'],desc:'50sポップス基本。',ex:'Stand By Me'}];
function detectKey(ns){if(ns.length<2)return null;let bk=-1,bs=0;for(let k=0;k<12;k++){let sc=0;const ds=DIA.map(d=>NM[(k+d.o)%12]+d.t);for(const cn of ns){const b=cn.replace('7','');if(ds.some(dc=>dc===b||dc===cn))sc++}if(sc>bs){bs=sc;bk=k}}return bs>=2?bk:null}
function getDeg(n,k){if(k===null)return'';const b=n.replace('7','');for(const d of DIA)if(NM[(k+d.o)%12]+d.t===b)return d.d;if(n===NM[(k+7)%12]+'7')return'V7';return'?'}
function getFunc(deg){const d=DIA.find(x=>x.d===deg);return d?d.fn:'?'}
function predictNext(deg,k){if(k===null||!deg)return[];const bd=deg.replace('7','');const tr=TRANS[bd];if(!tr)return[];return tr.sort((a,b)=>b.w-a.w).slice(0,5).map(t=>{const d=DIA.find(x=>x.d===t.to);return d?{name:NM[(k+d.o)%12]+d.t,deg:t.to,weight:t.w}:null}).filter(Boolean)}
function matchPat(ds){if(ds.length<3)return null;const s=ds.join(',');let bm=null,bl=0;for(const p of PATS){for(let l=Math.min(ds.length,p.degs.length);l>=3;l--){const ps=p.degs.slice(0,l).join(',');if(s.includes(ps)&&l>bl){bl=l;bm=p}}if(ds.length>=p.degs.length){const t=ds.slice(-p.degs.length).join(',');if(t===p.degs.join(',')&&p.degs.length>bl){bl=p.degs.length;bm=p}}}return bm}
function kn(deg){if(currentKey===null)return'';const d=DIA.find(x=>x.d===deg);return d?NM[(currentKey+d.o)%12]+d.t:''}
function scaleNotes(k){return[0,2,4,5,7,9,11].map(o=>NM[(k+o)%12])}

const VOI={'C':[[-1,3,2,0,1,0]],'D':[[-1,-1,0,2,3,2]],'E':[[0,2,2,1,0,0]],'F':[[1,3,3,2,1,1]],'G':[[3,2,0,0,0,3]],'A':[[-1,0,2,2,2,0]],'B':[[-1,2,4,4,4,2]],'Cm':[[3,3,5,5,4,3]],'Dm':[[-1,-1,0,2,3,1]],'Em':[[0,2,2,0,0,0]],'Fm':[[1,3,3,1,1,1]],'Gm':[[3,5,5,3,3,3]],'Am':[[-1,0,2,2,1,0]],'Bm':[[-1,2,4,4,3,2]],'C7':[[-1,3,2,3,1,0]],'D7':[[-1,-1,0,2,1,2]],'E7':[[0,2,0,1,0,0]],'F7':[[1,3,1,2,1,1]],'G7':[[3,2,0,0,0,1]],'A7':[[-1,0,2,0,2,0]],'B7':[[-1,2,1,2,0,2]],'C#':[[-1,4,3,1,2,1]],'D#':[[-1,-1,1,3,4,3]],'F#':[[2,4,4,3,2,2]],'G#':[[4,6,6,5,4,4]],'A#':[[-1,1,3,3,3,1]],'Db':[[-1,4,3,1,2,1]],'Eb':[[-1,-1,1,3,4,3]],'Gb':[[2,4,4,3,2,2]],'Ab':[[4,6,6,5,4,4]],'Bb':[[-1,1,3,3,3,1]],'C#m':[[-1,4,6,6,5,4]],'D#m':[[-1,-1,1,3,4,2]],'F#m':[[2,4,4,2,2,2]],'G#m':[[4,6,6,4,4,4]],'A#m':[[-1,1,3,3,2,1]],'Dbm':[[-1,4,6,6,5,4]],'Ebm':[[-1,-1,1,3,4,2]],'Gbm':[[2,4,4,2,2,2]],'Abm':[[4,6,6,4,4,4]],'Bbm':[[-1,1,3,3,2,1]]};
const CPAT={'':[0,4,7],'m':[0,3,7],'7':[0,4,7,10]};

function detectChord(midis,preds){if(midis.length<2)return null;const pc=[...new Set(midis.map(m=>((Math.round(m)%12)+12)%12))];if(pc.length<2)return null;let cands=[];for(let r=0;r<12;r++){for(const[sf,pt]of Object.entries(CPAT)){const cpc=pt.map(p=>(r+p)%12);const h=pc.filter(p=>cpc.includes(p)).length;const rs=h/Math.max(pc.length,cpc.length);if(h<2||rs<.3)continue;const nm=NM[r]+sf;let boost=0;const pr=preds.find(p=>p.name===nm);if(pr)boost=pr.weight*.07;else if(currentKey!==null&&getDeg(nm,currentKey)!=='?')boost=.05;cands.push({name:nm,notes:cpc.map(p=>NM[p]),score:rs+boost})}}cands.sort((a,b)=>b.score-a.score);return cands.length&&cands[0].score>.45?cands[0]:null}

// Guitar mode chord detection: trust the audio, minimal theory boost
function detectChordGuitar(midis){
  if(midis.length<2)return null;
  const pc=[...new Set(midis.map(m=>((Math.round(m)%12)+12)%12))];
  if(pc.length<2)return null;
  let cands=[];
  for(let r=0;r<12;r++){
    for(const[sf,pt]of Object.entries(CPAT)){
      const cpc=pt.map(p=>(r+p)%12);
      const h=pc.filter(p=>cpc.includes(p)).length;
      const rs=h/Math.max(pc.length,cpc.length);
      if(h<2||rs<.3)continue;
      const nm=NM[r]+sf;
      // Tiny theory boost: only to break ties, not override audio
      let boost=0;
      if(currentKey!==null&&getDeg(nm,currentKey)!=='?')boost=0.02;
      // Prefer chord whose root matches the lowest detected note
      const lowestMidi=Math.min(...midis);
      const lowestPC=((lowestMidi%12)+12)%12;
      if(r===lowestPC) boost+=0.08; // root in bass = strong signal
      cands.push({name:nm,notes:cpc.map(p=>NM[p]),score:rs+boost});
    }
  }
  cands.sort((a,b)=>b.score-a.score);
  return cands.length&&cands[0].score>.45?cands[0]:null;
}

// ═══ CHROMA-BASED CHORD DETECTION (for guitar mode) ═══
// All thresholds scale with sensitivity slider (1=strict, 10=loose)
function getGtrSens(){
  const t=(sens-1)/9; // 0..1
  return {
    magFloor:  0.001*(1-t)+0.000005*t,   // bin magnitude cutoff
    silenceMax:0.005*(1-t)+0.00005*t,     // chroma silence threshold
    activePC:  0.35*(1-t)+0.1*t,          // pitch class activation
    minScore:  0.25*(1-t)+0.08*t,         // minimum chord score
    penaltyTh: 0.5*(1-t)+0.25*t,          // non-chord-tone penalty threshold
  };
}

function chromaDetect(analyser, preds){
  const gs=getGtrSens();
  const fftSize=analyser.fftSize;
  const freqData=new Float32Array(analyser.frequencyBinCount);
  analyser.getFloatFrequencyData(freqData);
  const sr=actx?actx.sampleRate:44100;
  const binHz=sr/fftSize;

  // Build chroma vector (12 pitch classes)
  const chroma=new Float32Array(12);
  const minBin=Math.floor(75/binHz);
  const maxBin=Math.min(Math.floor(1300/binHz),freqData.length-1);

  for(let i=minBin;i<=maxBin;i++){
    const freq=i*binHz;
    if(freq<75)continue;
    const mag=Math.pow(10,freqData[i]/20); // dB to linear
    if(mag<gs.magFloor)continue;
    const midi=69+12*Math.log2(freq/440);
    const pc=((Math.round(midi)%12)+12)%12;
    chroma[pc]+=mag;
  }

  // Normalize
  const maxC=Math.max(...chroma);
  if(maxC<gs.silenceMax)return null;
  for(let i=0;i<12;i++)chroma[i]/=maxC;

  // Find active pitch classes
  const activePCs=[];
  for(let i=0;i<12;i++){
    if(chroma[i]>gs.activePC)activePCs.push(i);
  }
  if(activePCs.length<2)return null;

  // Match against chord patterns with theory boost
  let best=null,bs=0;
  for(let r=0;r<12;r++){
    for(const[sf,pt]of Object.entries(CPAT)){
      const cpc=pt.map(p=>(r+p)%12);
      let energy=0;
      for(const p of cpc) energy+=chroma[p];
      energy/=cpc.length;

      let penalty=0;
      for(let i=0;i<12;i++){
        if(!cpc.includes(i)&&chroma[i]>gs.penaltyTh) penalty+=chroma[i]*0.1;
      }
      let score=energy-penalty;

      // Theory boost
      const nm=NM[r]+sf;
      const pr=preds.find(p=>p.name===nm);
      if(pr) score+=pr.weight*0.05;
      else if(currentKey!==null&&getDeg(nm,currentKey)!=='?') score+=0.03;

      if(score>bs){bs=score;best={name:nm,notes:cpc.map(p=>NM[p]),score}}
    }
  }
  return bs>gs.minScore?best:null;
}

// ═══ CHORD PLAYBACK ═══
let playCtx=null;
function ensurePlayCtx(){
  if(!playCtx||playCtx.state==='closed') playCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(playCtx.state==='suspended') playCtx.resume();
  return playCtx;
}

function playChord(name){
  const ctx=ensurePlayCtx();
  const v=VOI[name];
  if(!v)return;
  const voicing=v[0];
  const openMidi=[40,45,50,55,59,64]; // E A D G B e

  // Collect frequencies from voicing
  const freqs=[];
  for(let i=0;i<6;i++){
    if(voicing[i]<0)continue;
    const midi=openMidi[i]+voicing[i];
    freqs.push(440*Math.pow(2,(midi-69)/12));
  }

  const now=ctx.currentTime;
  const master=ctx.createGain();
  master.gain.setValueAtTime(0.5,now); // loud
  master.gain.linearRampToValueAtTime(0.4,now+0.1);
  master.gain.exponentialRampToValueAtTime(0.15,now+1.5);
  master.gain.exponentialRampToValueAtTime(0.001,now+3.5);
  master.connect(ctx.destination);

  // Strum: slight delay between strings for realism
  freqs.forEach((f,idx)=>{
    const strumDelay=idx*0.02; // 20ms between strings

    // Fundamental
    const osc=ctx.createOscillator();
    const g=ctx.createGain();
    osc.type='triangle';
    osc.frequency.value=f;
    g.gain.setValueAtTime(0.25,now+strumDelay);
    g.gain.exponentialRampToValueAtTime(0.001,now+strumDelay+3);
    osc.connect(g);g.connect(master);
    osc.start(now+strumDelay);
    osc.stop(now+strumDelay+3.5);

    // 2nd harmonic for richness
    const osc2=ctx.createOscillator();
    const g2=ctx.createGain();
    osc2.type='sine';
    osc2.frequency.value=f*2;
    g2.gain.setValueAtTime(0.08,now+strumDelay);
    g2.gain.exponentialRampToValueAtTime(0.001,now+strumDelay+2);
    osc2.connect(g2);g2.connect(master);
    osc2.start(now+strumDelay);
    osc2.stop(now+strumDelay+2.5);

    // 3rd harmonic
    const osc3=ctx.createOscillator();
    const g3=ctx.createGain();
    osc3.type='sine';
    osc3.frequency.value=f*3;
    g3.gain.setValueAtTime(0.03,now+strumDelay);
    g3.gain.exponentialRampToValueAtTime(0.001,now+strumDelay+1.5);
    osc3.connect(g3);g3.connect(master);
    osc3.start(now+strumDelay);
    osc3.stop(now+strumDelay+2);
  });
}

// ═══ POSITION ═══
function allPos(m){const n=Math.round(m),r=[];for(let i=0;i<6;i++){const f=n-TUN[i];if(f>=0&&f<=19)r.push({str:i,fret:f})}return r}
function pickPos(m,ps,pf){const c=allPos(m);if(!c.length)return null;if(ps<0){c.sort((a,b)=>(a.fret*2+Math.abs(a.str-2)*.5)-(b.fret*2+Math.abs(b.str-2)*.5));return c[0]}c.sort((a,b)=>{const da=Math.abs(a.fret-pf)*3+(a.str===ps?5:0)+Math.abs(a.str-ps)*.5;const db=Math.abs(b.fret-pf)*3+(b.str===ps?5:0)+Math.abs(b.str-ps)*.5;return da-db});return c[0]}
function reOpt(ns,s){const e=Math.min(ns.length,s+5);let ps=s>0?ns[s-1].str:-1,pf=s>0?ns[s-1].fret:-1;for(let i=s;i<e;i++){const p=pickPos(ns[i].midi,ps,pf);if(p){ns[i].str=p.str;ns[i].fret=p.fret;ns[i].color=SC[p.str];ps=p.str;pf=p.fret}}}

// ═══ STATE ═══
let mode='tab',inMode='mic',rec=false,actx=null,ana=null,strm=null;
let notes=[],t0=0,prog=[],cWin=1500,sens=7;
let lastMidi=-1,lastT=0,selC=-1,pBuf=[],chordBuf=[],lastChordTime=0;
let currentKey=null,currentPredictions=[];const MCI=600;
// Guitar mode: accumulate pitches from rapid autocorrelation reads
let gtrPitchBuf=[]; // {midi, time} - short window to capture strummed notes
const GTR_WINDOW=250; // ms - a strum takes ~100-200ms
function getSP(){const t=(sens-1)/9;return{rms:.025*(1-t)+.002*t,corr:.7*(1-t)+.15*t}}
function stP(r){pBuf.push(r);if(pBuf.length>3)pBuf.shift();if(pBuf.length<2)return r;const s=[...pBuf].sort((a,b)=>a-b);return s[Math.floor(s.length/2)]}

// ═══ AUTOCORRELATION (for hum/audio) ═══
function acorr(buf,sr){const N=buf.length;let rms=0;for(let i=0;i<N;i++)rms+=buf[i]*buf[i];rms=Math.sqrt(rms/N);document.getElementById('lB').style.width=Math.min(100,rms*500)+'%';const sp=getSP();if(rms<sp.rms)return-1;const hN=Math.floor(N/2),c=new Float32Array(hN);for(let tau=0;tau<hN;tau++){let s=0;for(let i=0;i<N-tau;i++)s+=buf[i]*buf[i+tau];c[tau]=s}const c0=c[0];if(!c0)return-1;for(let i=0;i<hN;i++)c[i]/=c0;let fd=1;while(fd<hN-1&&c[fd]>.1)fd++;let bT=-1,bV=-1;for(let i=fd;i<hN-1;i++)if(c[i]>=c[i-1]&&c[i]>=c[i+1]&&c[i]>bV){bV=c[i];bT=i}if(bT<1||bV<sp.corr)return-1;if(bT>0&&bT<hN-1){const a=c[bT-1],b=c[bT],cv=c[bT+1],dn=2*(a-2*b+cv);if(Math.abs(dn)>.0001){const d=(a-cv)/dn;if(Math.abs(d)<1)bT+=d}}const f=sr/bT;return(f<65||f>1100)?-1:f}

// ═══ AUDIO ═══
async function startA(){
  actx=new(window.AudioContext||window.webkitAudioContext)();
  strm=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:inMode!=='guitar'}});
  const s=actx.createMediaStreamSource(strm);
  ana=actx.createAnalyser();
  ana.fftSize=inMode==='guitar'?8192:4096;
  ana.smoothingTimeConstant=inMode==='guitar'?0.8:0.5;
  s.connect(ana);
  t0=performance.now();rec=true;pBuf=[];chordBuf=[];lastChordTime=0;
  document.getElementById('mic').classList.add('on');document.getElementById('ov').classList.add('hide');

}
function stopA(){rec=false;document.getElementById('mic').classList.remove('on');document.getElementById('lB').style.width='0%';if(strm){strm.getTracks().forEach(t=>t.stop());strm=null}if(actx){actx.close();actx=null}}
function toggle(){rec?stopA():startA().catch(console.error)}

// ═══ MAIN LOOP ═══
function loop(){
  if(!rec)return;
  const now=performance.now();

  if(inMode==='guitar'){
    // Guitar mode: autocorrelation pitch detection (same as tuner apps)
    // then accumulate multiple pitches from a strum and detect chord
    const buf=new Float32Array(ana.fftSize);
    ana.getFloatTimeDomainData(buf);
    const rf=acorr(buf,actx.sampleRate);

    if(rf>0){
      const midi=69+12*Math.log2(rf/440);
      const rm=Math.round(midi);
      const nn=NM[((rm%12)+12)%12];
      document.getElementById('pN').textContent=nn;
      document.getElementById('pN').classList.add('on');
      document.getElementById('pH').textContent=rf.toFixed(0);

      // Accumulate detected pitches in short window
      gtrPitchBuf.push({midi:rm,time:now});
      gtrPitchBuf=gtrPitchBuf.filter(n=>now-n.time<GTR_WINDOW);

      // Also add to TAB notes
      const gap=rm===lastMidi?300:100;
      if(rm!==lastMidi||(now-lastT)>gap){
        const el=(now-t0)/1000,prev=notes.length?notes[notes.length-1]:null;
        const pos=pickPos(midi,prev?prev.str:-1,prev?prev.fret:-1);
        if(pos){notes.push({time:el,midi:rm,str:pos.str,fret:pos.fret,noteName:nn,color:SC[pos.str]});if(notes.length>2)reOpt(notes,Math.max(0,notes.length-5));lastMidi=rm;lastT=now}
      }

      // Try chord detection from accumulated pitches
      if(now-lastChordTime>MCI){
        const uq=[...new Set(gtrPitchBuf.map(n=>n.midi))];
        if(uq.length>=2){
          // Guitar mode: minimal theory boost for accuracy
          const ch=detectChordGuitar(uq);
          if(ch){
            const last=prog.length?prog[prog.length-1]:null;
            if(!last||last.name!==ch.name){
              const el=(now-t0)/1000,v=VOI[ch.name]?VOI[ch.name][0]:null;
              prog.push({name:ch.name,time:el,voicing:v,notes:ch.notes});
              lastChordTime=now;
              gtrPitchBuf=[];
              updTh();updStrip();updPr();
              if(mode==='learn')renderLearn();
            }
          }
        }
      }
    } else {
      document.getElementById('pN').classList.remove('on');
      // Clear stale pitches on silence
      if(gtrPitchBuf.length&&now-gtrPitchBuf[gtrPitchBuf.length-1].time>400) gtrPitchBuf=[];
    }
  } else {
    // Hum/audio mode: autocorrelation pitch detection
    const buf=new Float32Array(ana.fftSize);
    ana.getFloatTimeDomainData(buf);
    const rf=acorr(buf,actx.sampleRate);
    if(rf>0){
      const rm0=69+12*Math.log2(rf/440),midi=stP(rm0),rm=Math.round(midi),nn=NM[((rm%12)+12)%12];
      document.getElementById('pN').textContent=nn;document.getElementById('pN').classList.add('on');
      document.getElementById('pH').textContent=rf.toFixed(0);
      const gap=rm===lastMidi?400:150;
      if(rm!==lastMidi||(now-lastT)>gap){
        const el=(now-t0)/1000,prev=notes.length?notes[notes.length-1]:null;
        const pos=pickPos(midi,prev?prev.str:-1,prev?prev.fret:-1);
        if(pos){notes.push({time:el,midi:rm,str:pos.str,fret:pos.fret,noteName:nn,color:SC[pos.str]});if(notes.length>2)reOpt(notes,Math.max(0,notes.length-5));lastMidi=rm;lastT=now}
      }
      chordBuf.push({midi:rm,time:now});chordBuf=chordBuf.filter(n=>now-n.time<cWin);
      if(now-lastChordTime>MCI){
        const uq=[...new Set(chordBuf.map(n=>n.midi))];
        const ch=detectChord(uq,currentPredictions);
        if(ch){
          const last=prog.length?prog[prog.length-1]:null;
          if(!last||last.name!==ch.name){
            const el=(now-t0)/1000,v=VOI[ch.name]?VOI[ch.name][0]:null;
            prog.push({name:ch.name,time:el,voicing:v,notes:ch.notes});
            lastChordTime=now;chordBuf=[];
            updTh();updStrip();updPr();
            if(mode==='learn')renderLearn();
          }
        }
      }
    } else {
      document.getElementById('pN').classList.remove('on');
      if(chordBuf.length&&now-chordBuf[chordBuf.length-1].time>300)chordBuf=[];
    }
  }
  requestAnimationFrame(loop);
}

function resz(){const r=tc.parentElement.getBoundingClientRect(),d=window.devicePixelRatio||1;tc.width=r.width*d;tc.height=r.height*d;tc.style.width=r.width+'px';tc.style.height=r.height+'px'}
window.addEventListener('resize',resz);resz();const VIS=8;
function draw(){const d=window.devicePixelRatio||1,w=tc.width,h=tc.height;tx.clearRect(0,0,w,h);const pT=16*d,pB=16*d,pL=24*d,pR=14*d,dH=h-pT-pB,gap=dH/7;const sY=[];for(let i=0;i<6;i++)sY.push(pT+gap*(i+.5));for(let i=0;i<6;i++){const y=sY[i];tx.beginPath();tx.moveTo(pL,y);tx.lineTo(w-pR,y);tx.strokeStyle=SC[i]+'28';tx.lineWidth=1*d;tx.stroke();tx.fillStyle=SC[i]+'80';tx.font=`bold ${9*d}px JetBrains Mono`;tx.textAlign='right';tx.textBaseline='middle';tx.fillText(SL[i],pL-4*d,y)}const el=rec?(performance.now()-t0)/1000:(notes.length?notes[notes.length-1].time+1:0);const wE=el,wS=wE-VIS,phX=w-pR-28*d;tx.beginPath();tx.moveTo(phX,pT);tx.lineTo(phX,pT+dH);tx.strokeStyle='#ff6b6b20';tx.lineWidth=1.5*d;tx.stroke();const pxS=(phX-pL)/VIS;for(let ci=0;ci<prog.length;ci++){const c=prog[ci],nt=ci<prog.length-1?prog[ci+1].time:el;const x0=pL+(c.time-wS)*pxS,x1=pL+(nt-wS)*pxS;if(x1<pL||x0>w-pR)continue;const cx0=Math.max(pL,x0),cx1=Math.min(w-pR,x1);tx.fillStyle='rgba(255,107,107,.02)';tx.fillRect(cx0,pT,cx1-cx0,dH);if(cx0>=pL){tx.fillStyle='#ff6b6b40';tx.font=`bold ${8*d}px JetBrains Mono`;tx.textAlign='left';tx.textBaseline='bottom';tx.fillText(c.degree?`${c.name}(${c.degree})`:c.name,cx0+2*d,pT-2*d)}}for(const n of notes){const dt=n.time-wS;if(dt<-.5||dt>VIS+.5)continue;const x=pL+dt*pxS,y=sY[n.str],ft=String(n.fret);tx.font=`bold ${12*d}px JetBrains Mono`;const tw=tx.measureText(ft).width,bw=Math.max(tw+6*d,16*d),bh=16*d;tx.fillStyle=n.color+'18';tx.beginPath();tx.roundRect(x-bw/2,y-bh/2,bw,bh,3*d);tx.fill();tx.strokeStyle=n.color+'45';tx.lineWidth=1*d;tx.stroke();tx.fillStyle=n.color;tx.textAlign='center';tx.textBaseline='middle';tx.fillText(ft,x,y)}tx.fillStyle='#1a1a1a';tx.font=`${6*d}px JetBrains Mono`;tx.textAlign='center';tx.textBaseline='top';for(let t=Math.ceil(wS);t<=Math.floor(wE);t++){if(t<0)continue;const x=pL+(t-wS)*pxS;if(x>=pL&&x<=w-pR)tx.fillText(t+'s',x,pT+dH+3*d)}requestAnimationFrame(draw)}draw();

// ═══ UI ═══
function setMode(m){mode=m;document.querySelectorAll('#mT button').forEach(b=>b.classList.toggle('on',b.textContent===m.toUpperCase()));document.getElementById('lP').classList.toggle('show',m==='learn');tc.style.display=m==='learn'?'none':'block';if(m==='learn')renderLearn();if(m==='chord'&&prog.length)showDg(prog.length-1)}
function setIn(s){
  inMode=s;
  document.getElementById('cMic').classList.toggle('on',s==='mic');
  document.getElementById('cAud').classList.toggle('on',s==='audio');
  document.getElementById('cGtr').classList.toggle('on',s==='guitar');
  if(rec){stopA();startA().catch(console.error)}
}
function clearAll(){notes=[];chordBuf=[];gtrPitchBuf=[];prog=[];lastMidi=-1;selC=-1;pBuf=[];lastChordTime=0;currentKey=null;currentPredictions=[];document.getElementById('pN').textContent='--';document.getElementById('pH').textContent='---';document.getElementById('cb').innerHTML='<span class="lbl">進行</span>';document.getElementById('dg').classList.remove('open');document.getElementById('kB').textContent='Key: --';document.getElementById('paN').textContent='';renderPrUI();if(mode==='learn')renderLearn();if(rec)t0=performance.now()}
function doExport(){if(!notes.length&&!prog.length)return;let out='';if(notes.length){const q=.2,mxT=notes[notes.length-1].time,cols=Math.ceil(mxT/q)+1;const lines=Array.from({length:6},()=>Array(cols).fill('-'));for(const n of notes){const c=Math.round(n.time/q);if(c>=0&&c<cols)lines[n.str][c]=String(n.fret)}for(let i=0;i<6;i++)out+=SL[i]+'|'+lines[i].join('')+'|\n'}if(prog.length){out+='\n進行: '+prog.map(c=>c.name+(c.degree?'('+c.degree+')':'')).join(' → ')+'\n';if(currentKey!==null)out+='Key: '+NM[currentKey]+'\n'}navigator.clipboard.writeText(out).then(()=>{const b=document.querySelectorAll('.btn')[1];const o=b.textContent;b.textContent='COPIED!';setTimeout(()=>b.textContent=o,1200)}).catch(()=>alert(out))}
renderLearn();
</script>
