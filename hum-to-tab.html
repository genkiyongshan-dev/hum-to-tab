<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>HUM → TAB</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
:root{--bg:#08080a;--sf:#101014;--bd:#1c1c22;--acc:#ff6b6b;--tx:#ccc;--dm:#444;--gl:rgba(255,107,107,.12)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:'JetBrains Mono',monospace;overflow:hidden;height:100vh;touch-action:none;-webkit-user-select:none;user-select:none}
#app{display:flex;flex-direction:column;height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--bd);background:var(--sf)}
.logo{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--acc)}.logo span{color:var(--dm);font-weight:400}
.tog{display:flex;background:var(--bg);border-radius:5px;padding:2px;gap:1px}
.tog button{background:none;border:none;color:var(--dm);font-family:inherit;font-size:9px;padding:4px 9px;border-radius:3px;cursor:pointer}
.tog button.on{background:var(--acc);color:#000;font-weight:700}
.srow{display:flex;align-items:center;gap:8px;padding:5px 12px;border-bottom:1px solid var(--bd);background:var(--sf)}
.chip{display:inline-flex;align-items:center;gap:3px;border:1px solid var(--bd);padding:3px 8px;border-radius:12px;font-size:9px;color:var(--dm);cursor:pointer}
.chip.on{border-color:var(--acc);color:var(--acc)}
.chip svg{width:10px;height:10px}
.srow .spacer{flex:1}
.srow label{font-size:8px;color:var(--dm)}
.srow input[type=range]{-webkit-appearance:none;width:55px;height:3px;border-radius:2px;background:#282830;outline:none}
.srow input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--acc);cursor:pointer}
.srow .sv{font-size:8px;color:var(--acc);min-width:22px;text-align:right}
.pitch{display:flex;align-items:center;justify-content:center;gap:12px;padding:6px 12px;border-bottom:1px solid var(--bd);min-height:48px}
.pitch .note{font-size:30px;font-weight:700;min-width:44px;text-align:center;color:var(--dm);transition:color .15s}
.pitch .note.on{color:var(--acc)}
.pitch .hz{font-size:13px}.pitch .hzl{font-size:7px;color:var(--dm)}
.cbar{display:flex;align-items:center;gap:4px;padding:5px 12px;border-bottom:1px solid var(--bd);overflow-x:auto;scrollbar-width:none;min-height:26px}
.cbar::-webkit-scrollbar{display:none}
.cbar .lbl{font-size:7px;color:var(--dm);flex-shrink:0;margin-right:2px}
.cbar .tag{flex-shrink:0;padding:3px 8px;border-radius:3px;font-size:11px;font-weight:700;background:#15151a;color:var(--dm);border:1px solid var(--bd);cursor:pointer}
.cbar .tag.now{background:rgba(255,107,107,.12);border-color:rgba(255,107,107,.4);color:var(--acc)}
.cbar .tag.sel{background:rgba(255,107,107,.2);border-color:var(--acc);color:var(--acc)}
.cbar .arr{color:#222;font-size:8px;flex-shrink:0}
.dgr{border-bottom:1px solid var(--bd);overflow:hidden;max-height:0;transition:max-height .25s;background:var(--sf)}
.dgr.open{max-height:160px}
.dgr .inner{display:flex;align-items:center;padding:8px 12px;gap:10px}
.dgr .cname{font-size:22px;font-weight:700;color:var(--acc);min-width:40px}
.dgr .info{font-size:8px;color:var(--dm);line-height:1.6}
.tabw{flex:1;position:relative;overflow:hidden}
.tabw canvas{width:100%;height:100%;display:block}
.ctrl{display:flex;align-items:center;justify-content:center;padding:10px;gap:12px;border-top:1px solid var(--bd);background:var(--sf)}
.ctrl .mic{width:48px;height:48px;border-radius:50%;border:2px solid var(--acc);background:transparent;color:var(--acc);cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative}
.ctrl .mic.on{background:var(--acc);color:#000;box-shadow:0 0 14px var(--gl)}
.ctrl .mic.on::after{content:'';position:absolute;inset:-5px;border-radius:50%;border:2px solid var(--acc);animation:p 1.4s ease-out infinite}
@keyframes p{0%{transform:scale(1);opacity:.5}100%{transform:scale(1.25);opacity:0}}
.ctrl .mic svg{width:18px;height:18px}
.ctrl .btn{background:none;border:1px solid var(--bd);color:var(--dm);font-family:inherit;font-size:9px;padding:6px 10px;border-radius:5px;cursor:pointer}
.ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(8,8,10,.85);z-index:20;transition:opacity .4s;pointer-events:none}
.ov.hide{opacity:0}
.ov h2{font-size:14px;color:var(--acc);margin-bottom:6px;letter-spacing:1px;text-align:center}
.ov p{font-size:10px;color:var(--dm);line-height:1.7;max-width:230px;text-align:center}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="logo">HUM<span>→</span>TAB</div>
    <div class="tog">
      <button class="on" onclick="setMode('tab',this)">TAB</button>
      <button onclick="setMode('chord',this)">CHORD</button>
    </div>
  </div>
  <div class="srow">
    <div class="chip on" id="cMic" onclick="setIn('mic')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/></svg>MIC</div>
    <div class="chip" id="cAud" onclick="setIn('audio')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>AUDIO</div>
    <div class="spacer"></div>
    <label>窓</label>
    <input type="range" min="500" max="3000" value="1500" step="100" oninput="cWin=+this.value;this.nextElementSibling.textContent=(cWin/1000).toFixed(1)+'s'">
    <span class="sv">1.5s</span>
  </div>
  <div class="pitch">
    <div><div class="note" id="pNote">--</div><div><span class="hz" id="pHz">---</span><span class="hzl"> Hz</span></div></div>
  </div>
  <div class="cbar" id="cbar"><span class="lbl">進行</span></div>
  <div class="dgr" id="dgr"><div class="inner"><div class="cname" id="dN">--</div><canvas id="dC" width="130" height="100"></canvas><div class="info" id="dI"></div></div></div>
  <div class="tabw">
    <canvas id="tc"></canvas>
    <div class="ov" id="ov"><div class="t"><h2>HUM → TAB</h2><p>マイクボタンを押して鼻歌や音源を入力<br><br>基本コード（メジャー/マイナー/7th）を<br>リアルタイム解析します</p></div></div>
  </div>
  <div class="ctrl">
    <button class="btn" onclick="clearAll()">CLEAR</button>
    <button class="mic" id="mic" onclick="toggle()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></button>
    <button class="btn" onclick="doExport()">EXPORT</button>
  </div>
</div>
<script>
const TUN=[64,59,55,50,45,40];
const NM=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const SC=['#ff6b6b','#ffa94d','#ffd43b','#69db7c','#74c0fc','#b197fc'];
const SL=['e','B','G','D','A','E'];

const VOI={
'C':[[-1,3,2,0,1,0]],'D':[[-1,-1,0,2,3,2]],'E':[[0,2,2,1,0,0]],'F':[[1,3,3,2,1,1]],
'G':[[3,2,0,0,0,3]],'A':[[-1,0,2,2,2,0]],'B':[[-1,2,4,4,4,2]],
'Cm':[[3,3,5,5,4,3]],'Dm':[[-1,-1,0,2,3,1]],'Em':[[0,2,2,0,0,0]],'Fm':[[1,3,3,1,1,1]],
'Gm':[[3,5,5,3,3,3]],'Am':[[-1,0,2,2,1,0]],'Bm':[[-1,2,4,4,3,2]],
'C7':[[-1,3,2,3,1,0]],'D7':[[-1,-1,0,2,1,2]],'E7':[[0,2,0,1,0,0]],'F7':[[1,3,1,2,1,1]],
'G7':[[3,2,0,0,0,1]],'A7':[[-1,0,2,0,2,0]],'B7':[[-1,2,1,2,0,2]],
'C#':[[-1,4,3,1,2,1]],'D#':[[-1,-1,1,3,4,3]],'F#':[[2,4,4,3,2,2]],'G#':[[4,6,6,5,4,4]],
'A#':[[-1,1,3,3,3,1]],'Db':[[-1,4,3,1,2,1]],'Eb':[[-1,-1,1,3,4,3]],'Gb':[[2,4,4,3,2,2]],
'Ab':[[4,6,6,5,4,4]],'Bb':[[-1,1,3,3,3,1]],
'C#m':[[-1,4,6,6,5,4]],'D#m':[[-1,-1,1,3,4,2]],'F#m':[[2,4,4,2,2,2]],'G#m':[[4,6,6,4,4,4]],
'A#m':[[-1,1,3,3,2,1]],'Dbm':[[-1,4,6,6,5,4]],'Ebm':[[-1,-1,1,3,4,2]],'Gbm':[[2,4,4,2,2,2]],
'Abm':[[4,6,6,4,4,4]],'Bbm':[[-1,1,3,3,2,1]],
};

const CPAT={'':  [0,4,7],'m':[0,3,7],'7':[0,4,7,10]};

function detectChord(midis){
  if(midis.length<2)return null;
  const pc=[...new Set(midis.map(m=>((Math.round(m)%12)+12)%12))];
  if(pc.length<2)return null;
  let best=null,bs=0;
  for(let r=0;r<12;r++){
    for(const[sf,pt]of Object.entries(CPAT)){
      const cpc=pt.map(p=>(r+p)%12);
      const h=pc.filter(p=>cpc.includes(p)).length;
      const s=h/Math.max(pc.length,cpc.length);
      if(h>=2&&s>bs){bs=s;best={name:NM[r]+sf,notes:cpc.map(p=>NM[p]),score:s}}
    }
  }
  return bs>.5?best:null;
}

// Position optimizer
function allPos(midi){const n=Math.round(midi),r=[];for(let i=0;i<6;i++){const f=n-TUN[i];if(f>=0&&f<=19)r.push({str:i,fret:f})}return r}
function pickPos(midi,ps,pf){
  const c=allPos(midi);if(!c.length)return null;
  if(ps<0){c.sort((a,b)=>(a.fret*2+Math.abs(a.str-2)*.5)-(b.fret*2+Math.abs(b.str-2)*.5));return c[0]}
  c.sort((a,b)=>{
    const da=Math.abs(a.fret-pf)*3+(a.str===ps?5:0)+Math.abs(a.str-ps)*.5;
    const db=Math.abs(b.fret-pf)*3+(b.str===ps?5:0)+Math.abs(b.str-ps)*.5;
    return da-db;
  });
  return c[0];
}
function reOpt(notes,start){
  const end=Math.min(notes.length,start+5);
  let ps=start>0?notes[start-1].str:-1,pf=start>0?notes[start-1].fret:-1;
  for(let i=start;i<end;i++){const p=pickPos(notes[i].midi,ps,pf);if(p){notes[i].str=p.str;notes[i].fret=p.fret;notes[i].color=SC[p.str];ps=p.str;pf=p.fret}}
}

// ─── State ───
let mode='tab',rec=false,actx=null,ana=null,strm=null;
let notes=[],t0=0,prog=[],cWin=1500;
let lastMidi=-1,lastT=0,selC=-1;

// Pitch stability: median of 3
let pBuf=[];
function stablePitch(raw){
  pBuf.push(raw);
  if(pBuf.length>3)pBuf.shift();
  if(pBuf.length<2)return raw;
  const s=[...pBuf].sort((a,b)=>a-b);
  return s[Math.floor(s.length/2)];
}

// Chord buffer: sliding window of recent MIDI notes with timestamps
let chordBuf=[]; // {midi, time}
let lastChordTime=0; // prevent rapid chord changes
const MIN_CHORD_INTERVAL=600; // ms between chord changes

// ─── Audio ───
async function startA(){
  actx=new(window.AudioContext||window.webkitAudioContext)();
  strm=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:true}});
  const s=actx.createMediaStreamSource(strm);
  ana=actx.createAnalyser();ana.fftSize=4096;s.connect(ana);
  t0=performance.now();rec=true;pBuf=[];chordBuf=[];lastChordTime=0;
  document.getElementById('mic').classList.add('on');
  document.getElementById('ov').classList.add('hide');
  loop();
}
function stopA(){
  rec=false;document.getElementById('mic').classList.remove('on');
  if(strm){strm.getTracks().forEach(t=>t.stop());strm=null}
  if(actx){actx.close();actx=null}
}
function toggle(){rec?stopA():startA().catch(e=>console.error(e))}

// Autocorrelation
function acorr(buf,sr){
  const N=buf.length;let rms=0;
  for(let i=0;i<N;i++)rms+=buf[i]*buf[i];
  rms=Math.sqrt(rms/N);if(rms<.008)return-1;
  let r1=0,r2=N-1;
  for(let i=0;i<N/2;i++)if(Math.abs(buf[i])<.2){r1=i;break}
  for(let i=1;i<N/2;i++)if(Math.abs(buf[N-i])<.2){r2=N-i;break}
  const tb=buf.slice(r1,r2),tN=tb.length;
  const c=new Float32Array(tN);
  for(let i=0;i<tN;i++)for(let j=0;j<tN-i;j++)c[i]+=tb[j]*tb[j+i];
  let d=0;while(c[d]>c[d+1])d++;
  let mx=-1,mp=-1;
  for(let i=d;i<tN;i++)if(c[i]>mx){mx=c[i];mp=i}
  let T=mp;
  if(T>0&&T<tN-1){const x1=c[T-1],x2=c[T],x3=c[T+1],a=(x1+x3-2*x2)/2,b=(x3-x1)/2;if(a)T-=b/(2*a)}
  return sr/T;
}

// ─── Main loop ───
const NOTE_GAP=150;
const SAME_GAP=400;

function loop(){
  if(!rec)return;
  const buf=new Float32Array(ana.fftSize);
  ana.getFloatTimeDomainData(buf);
  const rawFreq=acorr(buf,actx.sampleRate);
  const now=performance.now();

  if(rawFreq>70&&rawFreq<1100){
    const rawMidi=69+12*Math.log2(rawFreq/440);
    const midi=stablePitch(rawMidi);
    const rm=Math.round(midi);
    const nn=NM[((rm%12)+12)%12];

    document.getElementById('pNote').textContent=nn;
    document.getElementById('pNote').classList.add('on');
    document.getElementById('pHz').textContent=rawFreq.toFixed(0);

    // TAB notes
    const gap=rm===lastMidi?SAME_GAP:NOTE_GAP;
    if(rm!==lastMidi||(now-lastT)>gap){
      const elapsed=(now-t0)/1000;
      const prev=notes.length>0?notes[notes.length-1]:null;
      const pos=pickPos(midi,prev?prev.str:-1,prev?prev.fret:-1);
      if(pos){
        notes.push({time:elapsed,midi:rm,str:pos.str,fret:pos.fret,noteName:nn,color:SC[pos.str]});
        if(notes.length>2)reOpt(notes,Math.max(0,notes.length-5));
        lastMidi=rm;lastT=now;
      }
    }

    // ─── Chord detection (fixed) ───
    // Add to sliding window
    chordBuf.push({midi:rm,time:now});
    // Remove old entries outside the window
    chordBuf=chordBuf.filter(n=>now-n.time<cWin);

    // Only try chord detection if enough time since last chord change
    if(now-lastChordTime>MIN_CHORD_INTERVAL){
      // Get unique pitches in the window
      const uq=[...new Set(chordBuf.map(n=>n.midi))];
      const ch=detectChord(uq);
      if(ch){
        const last=prog.length>0?prog[prog.length-1]:null;
        if(!last||last.name!==ch.name){
          const elapsed=(now-t0)/1000;
          const v=VOI[ch.name]?VOI[ch.name][0]:null;
          prog.push({name:ch.name,time:elapsed,voicing:v,notes:ch.notes});
          lastChordTime=now;
          // Clear buffer so new chord starts fresh
          chordBuf=[];
          updStrip();
        }
      }
    }
  } else {
    document.getElementById('pNote').classList.remove('on');
    // Silence: clear chord buffer so next sound starts fresh
    if(chordBuf.length>0){
      const silenceThreshold=300; // ms of silence before clearing
      const lastEntry=chordBuf[chordBuf.length-1];
      if(now-lastEntry.time>silenceThreshold){
        chordBuf=[];
      }
    }
  }
  requestAnimationFrame(loop);
}

// ─── Chord strip ───
function updStrip(){
  const el=document.getElementById('cbar');
  let h='<span class="lbl">進行</span>';
  prog.forEach((c,i)=>{
    if(i>0)h+='<span class="arr">→</span>';
    const cls=i===prog.length-1?'tag now':i===selC?'tag sel':'tag';
    h+=`<span class="${cls}" onclick="showDgr(${i})">${c.name}</span>`;
  });
  el.innerHTML=h;
  el.scrollLeft=el.scrollWidth;
  if(prog.length>0)showDgr(prog.length-1);
}

// ─── Diagram ───
function showDgr(i){
  selC=i;const c=prog[i];if(!c)return;
  document.getElementById('dgr').classList.add('open');
  document.getElementById('dN').textContent=c.name;
  document.querySelectorAll('.tag').forEach((e,j)=>e.className=j===i?'tag sel':j===prog.length-1?'tag now':'tag');
  const inf=document.getElementById('dI');
  if(c.voicing){
    inf.innerHTML=`E  A  D  G  B  e<br>${c.voicing.map(f=>f===-1?'x':f).join('  ')}<br><br>構成音: ${c.notes.join(' · ')}`;
    drawDgr(c.voicing);
  } else {
    inf.innerHTML=`構成音: ${c.notes.join(' · ')}`;drawDgrE();
  }
}

function drawDgr(v){
  const cv=document.getElementById('dC'),c=cv.getContext('2d'),d=window.devicePixelRatio||1;
  cv.width=130*d;cv.height=100*d;cv.style.width='130px';cv.style.height='100px';
  c.scale(d,d);c.clearRect(0,0,130,100);
  const L=20,T=16,W=90,H=72,ss=W/5,fs=H/4;
  const played=v.filter(f=>f>0);
  let mf=played.length?Math.min(...played):1;if(mf<=2)mf=1;
  if(mf===1){c.fillStyle='#555';c.fillRect(L-1,T-1,W+2,2)}
  else{c.fillStyle='#444';c.font='7px JetBrains Mono';c.textAlign='right';c.textBaseline='middle';c.fillText(mf+'fr',L-3,T+fs/2)}
  c.strokeStyle='#252530';c.lineWidth=1;
  for(let i=0;i<6;i++){c.beginPath();c.moveTo(L+i*ss,T);c.lineTo(L+i*ss,T+H);c.stroke()}
  for(let i=0;i<=4;i++){c.beginPath();c.moveTo(L,T+i*fs);c.lineTo(L+W,T+i*fs);c.stroke()}
  for(let i=0;i<6;i++){
    const x=L+i*ss,f=v[i];
    if(f===-1){c.fillStyle='#444';c.font='bold 8px JetBrains Mono';c.textAlign='center';c.textBaseline='bottom';c.fillText('×',x,T-2)}
    else if(f===0){c.strokeStyle='#777';c.lineWidth=1.2;c.beginPath();c.arc(x,T-5,3,0,Math.PI*2);c.stroke()}
    else{const y=T+(f-mf)*fs+fs/2;c.fillStyle=SC[5-i];c.beginPath();c.arc(x,y,5,0,Math.PI*2);c.fill();c.fillStyle='#000';c.font='bold 6px JetBrains Mono';c.textAlign='center';c.textBaseline='middle';c.fillText(f,x,y)}
  }
  c.fillStyle='#333';c.font='6px JetBrains Mono';c.textAlign='center';c.textBaseline='top';
  ['E','A','D','G','B','e'].forEach((s,i)=>c.fillText(s,L+i*ss,T+H+2));
}
function drawDgrE(){
  const cv=document.getElementById('dC'),c=cv.getContext('2d'),d=window.devicePixelRatio||1;
  cv.width=130*d;cv.height=100*d;cv.style.width='130px';cv.style.height='100px';
  c.scale(d,d);c.clearRect(0,0,130,100);c.fillStyle='#333';c.font='9px JetBrains Mono';c.textAlign='center';c.textBaseline='middle';c.fillText('—',65,50);
}

// ─── TAB canvas ───
const tc=document.getElementById('tc'),tx=tc.getContext('2d');
function resz(){const r=tc.parentElement.getBoundingClientRect(),d=window.devicePixelRatio||1;tc.width=r.width*d;tc.height=r.height*d;tc.style.width=r.width+'px';tc.style.height=r.height+'px'}
window.addEventListener('resize',resz);resz();
const VIS=8;

function draw(){
  const d=window.devicePixelRatio||1,w=tc.width,h=tc.height;
  tx.clearRect(0,0,w,h);
  const P={t:20*d,b:14*d,l:22*d,r:14*d};
  const dh=h-P.t-P.b,ss=dh/7;
  for(let i=0;i<6;i++){
    const y=P.t+ss*(i+.5);
    tx.beginPath();tx.moveTo(P.l,y);tx.lineTo(w-P.r,y);tx.strokeStyle=SC[i]+'22';tx.lineWidth=1*d;tx.stroke();
    tx.fillStyle=SC[i]+'60';tx.font=`${8*d}px JetBrains Mono`;tx.textAlign='right';tx.textBaseline='middle';tx.fillText(SL[i],P.l-3*d,y);
  }
  const elapsed=rec?(performance.now()-t0)/1000:(notes.length>0?notes[notes.length-1].time+1:0);
  const wE=elapsed,wS=wE-VIS;
  const phX=w-P.r-28*d;
  tx.beginPath();tx.moveTo(phX,P.t);tx.lineTo(phX,P.t+dh);tx.strokeStyle='#ff6b6b20';tx.lineWidth=1.5*d;tx.stroke();
  const pxS=(phX-P.l)/VIS;

  for(let ci=0;ci<prog.length;ci++){
    const c=prog[ci];const nt=ci<prog.length-1?prog[ci+1].time:elapsed;
    const x0=P.l+(c.time-wS)*pxS,x1=P.l+(nt-wS)*pxS;
    if(x1<P.l||x0>w-P.r)continue;
    const cx0=Math.max(P.l,x0),cx1=Math.min(w-P.r,x1);
    tx.fillStyle='rgba(255,107,107,.02)';tx.fillRect(cx0,P.t,cx1-cx0,dh);
    if(cx0>=P.l){tx.fillStyle='#ff6b6b35';tx.font=`bold ${8*d}px JetBrains Mono`;tx.textAlign='left';tx.textBaseline='bottom';tx.fillText(c.name,cx0+2*d,P.t-2*d)}
  }
  for(const n of notes){
    const dt=n.time-wS;if(dt<-.5||dt>VIS+.5)continue;
    const x=P.l+dt*pxS,y=P.t+ss*(n.str+.5);
    const ft=String(n.fret);
    tx.font=`bold ${11*d}px JetBrains Mono`;
    const tw=tx.measureText(ft).width;
    const bw=Math.max(tw+5*d,14*d),bh=14*d;
    tx.fillStyle=n.color+'15';tx.beginPath();tx.roundRect(x-bw/2,y-bh/2,bw,bh,3*d);tx.fill();
    tx.strokeStyle=n.color+'40';tx.lineWidth=1*d;tx.stroke();
    tx.fillStyle=n.color;tx.textAlign='center';tx.textBaseline='middle';tx.fillText(ft,x,y);
  }
  tx.fillStyle='#1a1a1a';tx.font=`${6*d}px JetBrains Mono`;tx.textAlign='center';tx.textBaseline='top';
  for(let t=Math.ceil(wS);t<=Math.floor(wE);t++){if(t<0)continue;const x=P.l+(t-wS)*pxS;if(x>=P.l&&x<=w-P.r)tx.fillText(t+'s',x,P.t+dh+2*d)}
  requestAnimationFrame(draw);
}
draw();

// ─── UI ───
function setMode(m,btn){mode=m;document.querySelectorAll('.tog button').forEach(b=>b.classList.remove('on'));btn.classList.add('on');if(m==='chord'&&prog.length>0)showDgr(prog.length-1)}
function setIn(s){document.getElementById('cMic').classList.toggle('on',s==='mic');document.getElementById('cAud').classList.toggle('on',s==='audio');if(rec){stopA();startA().catch(e=>console.error(e))}}
function clearAll(){notes=[];chordBuf=[];prog=[];lastMidi=-1;selC=-1;pBuf=[];lastChordTime=0;document.getElementById('pNote').textContent='--';document.getElementById('pHz').textContent='---';document.getElementById('cbar').innerHTML='<span class="lbl">進行</span>';document.getElementById('dgr').classList.remove('open');if(rec)t0=performance.now()}
function doExport(){
  if(!notes.length)return;
  const q=.2,maxT=notes[notes.length-1].time,cols=Math.ceil(maxT/q)+1;
  const lines=Array.from({length:6},()=>Array(cols).fill('-'));
  for(const n of notes){const c=Math.round(n.time/q);if(c>=0&&c<cols)lines[n.str][c]=String(n.fret)}
  let out='';for(let i=0;i<6;i++)out+=SL[i]+'|'+lines[i].join('')+'|\n';
  if(prog.length)out+='\n進行: '+prog.map(c=>c.name).join(' → ')+'\n';
  navigator.clipboard.writeText(out).then(()=>{const b=document.querySelectorAll('.btn')[1];const o=b.textContent;b.textContent='COPIED!';setTimeout(()=>b.textContent=o,1200)}).catch(()=>alert(out));
}
</script>
